services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\"",
        ]
      interval: 10s
      timeout: 8s
      retries: 6
      start_period: 90s
    environment:
      DATABASE_URL: ${DATABASE_URL}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_PUBLIC_ENDPOINT_URL: ${S3_PUBLIC_ENDPOINT_URL}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION:-ru-1}
      CORS_ORIGINS: ${CORS_ORIGINS}
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN}
      SEED_ON_STARTUP: ${SEED_ON_STARTUP:-true}
      FORCE_RESEED: ${FORCE_RESEED:-false}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.status<400?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 60s
    environment:
      ORIGIN: ${PUBLIC_ORIGIN}
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
