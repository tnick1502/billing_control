services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mrp_bom_orders
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Консоль за nginx: http://<сервер>/minio/ — задайте PUBLIC_ORIGIN в .env на проде
      MINIO_CONSOLE_SUBPATH: /minio/
      MINIO_BROWSER_REDIRECT_URL: ${PUBLIC_ORIGIN:-http://localhost}/minio/
      MINIO_SERVER_URL: ${PUBLIC_ORIGIN:-http://localhost}/minio-s3
    volumes:
      - miniodata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/mrp_bom_orders
      S3_ENDPOINT_URL: http://minio:9000
      # Браузер качает файлы через nginx: http://<хост>/minio-s3/...
      S3_PUBLIC_ENDPOINT_URL: ${S3_PUBLIC_ENDPOINT_URL:-http://localhost/minio-s3}
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: invoices
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost}
      SEED_ON_STARTUP: "true"
    depends_on:
      postgres:
        condition: service_healthy
    # Без публикации 8000 на хост: API только для nginx внутри compose (иначе боты и сканы на :8000).
    # Снаружи: http://<сервер>/api/…  ·  Swagger: http://<сервер>/api/docs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      ORIGIN: ${PUBLIC_ORIGIN:-http://localhost}
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
      - minio
      - portainer

  # Дашборд Docker: http://<сервер>/portainer/
  portainer:
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  miniodata:
  portainer_data:
